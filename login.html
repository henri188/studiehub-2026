<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>HydrarGyrum — Studiehub</title>
  <!-- Apply saved theme before first paint to prevent flash -->
  <script>
    (function(){
      var s = null;
      try { s = localStorage.getItem('hg-theme'); } catch(e){}
      if (!s) s = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', s);
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="css/hg-tokens.css">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body class="auth-page">

  <!-- Theme toggle -->
  <button class="theme-btn" id="theme-btn">
    <span class="dot"></span>
    <span class="theme-label">Dark</span>
  </button>

  <!-- Auth card -->
  <div class="auth-card">

    <!-- HydrarGyrum mark -->
    <div class="auth-mark">
      <svg viewBox="0 0 100 120" aria-label="HydrarGyrum mark">
        <path d="M50 6 C50 6,18 52,18 78 A32 32 0 1 0 82 78 C82 52,50 6,50 6 Z" fill="currentColor"/>
      </svg>
    </div>

    <div class="auth-heading">
      <h1>HydrarGyrum</h1>
      <p>Studiehub — 2026</p>
    </div>

    <div class="auth-divider"></div>

    <!-- ── Login panel ── -->
    <div id="login-panel">
      <div class="field">
        <label for="login-email">E-mailadres</label>
        <input type="email" id="login-email" placeholder="naam@voorbeeld.com" autocomplete="email" inputmode="email"/>
      </div>
      <div class="field">
        <label for="login-pw">Wachtwoord</label>
        <input type="password" id="login-pw" placeholder="••••••••" autocomplete="current-password"/>
      </div>

      <button class="btn-primary" id="login-btn">
        <span id="login-label">Inloggen</span>
        <span id="login-spinner" class="spinner" style="display:none"></span>
      </button>

      <div class="auth-or"><span>of</span></div>

      <button class="btn-google" id="google-btn-login" type="button">
        <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Doorgaan met Google
      </button>

      <div class="auth-error" id="login-error"></div>

      <div class="auth-toggle">
        Nog geen account?
        <button type="button" id="to-register">Registreer</button>
      </div>
    </div>

    <!-- ── Register panel ── -->
    <div id="register-panel" style="display:none">
      <div class="field">
        <label for="reg-name">Naam <span style="color:var(--quicksilver);font-family:var(--font-mono);font-size:9px;letter-spacing:0.06em;text-transform:uppercase;">(optioneel)</span></label>
        <input type="text" id="reg-name" placeholder="Je naam" autocomplete="name"/>
      </div>
      <div class="field">
        <label for="reg-email">E-mailadres</label>
        <input type="email" id="reg-email" placeholder="naam@voorbeeld.com" autocomplete="email" inputmode="email"/>
      </div>
      <div class="field">
        <label for="reg-pw">Wachtwoord</label>
        <input type="password" id="reg-pw" placeholder="Minimaal 6 tekens" autocomplete="new-password"/>
        <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
        <span class="pw-hint" id="pw-hint">Voer een wachtwoord in</span>
      </div>
      <div class="field">
        <label for="reg-pw2">Herhaal wachtwoord</label>
        <input type="password" id="reg-pw2" placeholder="••••••••" autocomplete="new-password"/>
      </div>

      <button class="btn-primary" id="register-btn">
        <span id="reg-label">Account aanmaken</span>
        <span id="reg-spinner" class="spinner" style="display:none"></span>
      </button>

      <div class="auth-or"><span>of</span></div>

      <button class="btn-google" id="google-btn-reg" type="button">
        <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Doorgaan met Google
      </button>

      <div class="auth-error" id="register-error"></div>

      <div class="auth-toggle">
        Al een account?
        <button type="button" id="to-login">Inloggen</button>
      </div>
    </div>

  </div><!-- /auth-card -->

  <script type="module">
    import { AuthService, authErrorMessage } from './js/auth.js';

    // Redirect if already logged in
    AuthService.onAuthChange((user) => {
      if (user) window.location.replace('index.html');
    });

    // ── Theme ──────────────────────────────────────────────────────────────────
    const root     = document.documentElement;
    const themeBtn = document.getElementById('theme-btn');
    function updateThemeLabel() {
      themeBtn.querySelector('.theme-label').textContent =
        root.getAttribute('data-theme') === 'dark' ? 'Light' : 'Dark';
    }
    updateThemeLabel();
    themeBtn.addEventListener('click', () => {
      const next = root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      root.setAttribute('data-theme', next);
      try { localStorage.setItem('hg-theme', next); } catch(e){}
      updateThemeLabel();
    });

    // ── Panel toggle ───────────────────────────────────────────────────────────
    document.getElementById('to-register').addEventListener('click', () => {
      document.getElementById('login-panel').style.display = 'none';
      document.getElementById('register-panel').style.display = 'block';
      document.getElementById('reg-name').focus();
    });
    document.getElementById('to-login').addEventListener('click', () => {
      document.getElementById('register-panel').style.display = 'none';
      document.getElementById('login-panel').style.display = 'block';
      document.getElementById('login-email').focus();
    });

    // ── Password strength ──────────────────────────────────────────────────────
    document.getElementById('reg-pw').addEventListener('input', function() {
      const pw = this.value;
      let score = 0;
      if (pw.length >= 6)          score++;
      if (pw.length >= 10)         score++;
      if (/[A-Z]/.test(pw))        score++;
      if (/[0-9]/.test(pw))        score++;
      if (/[^A-Za-z0-9]/.test(pw)) score++;
      const fill = document.getElementById('strength-fill');
      const hint = document.getElementById('pw-hint');
      fill.style.width = Math.min(100, score * 22) + '%';
      fill.style.background = score <= 1 ? 'var(--cinnabar)' : score <= 3 ? '#C9963A' : 'var(--moss)';
      hint.textContent = !pw ? 'Voer een wachtwoord in'
        : score <= 1 ? 'Te kort of te eenvoudig'
        : score <= 3 ? 'Redelijk — kan sterker'
        : 'Sterk wachtwoord';
    });

    // ── Helpers ────────────────────────────────────────────────────────────────
    function setLoading(btnId, spinnerId, labelId, on) {
      const btn = document.getElementById(btnId);
      btn.disabled = on;
      document.getElementById(spinnerId).style.display = on ? 'block' : 'none';
      document.getElementById(labelId).style.display   = on ? 'none'  : 'block';
    }
    function showError(id, msg) {
      if (!msg) return;
      const el = document.getElementById(id);
      el.textContent = msg;
      el.classList.add('visible');
    }
    function clearError(id) {
      document.getElementById(id).classList.remove('visible');
    }

    // ── Login ──────────────────────────────────────────────────────────────────
    async function doLogin() {
      const email = document.getElementById('login-email').value.trim();
      const pw    = document.getElementById('login-pw').value;
      clearError('login-error');
      if (!email || !pw) { showError('login-error', 'Vul alle velden in.'); return; }
      setLoading('login-btn', 'login-spinner', 'login-label', true);
      try {
        await AuthService.login(email, pw);
        window.location.replace('index.html');
      } catch (e) {
        showError('login-error', authErrorMessage(e.code));
        setLoading('login-btn', 'login-spinner', 'login-label', false);
      }
    }
    document.getElementById('login-btn').addEventListener('click', doLogin);
    ['login-email', 'login-pw'].forEach(id =>
      document.getElementById(id).addEventListener('keydown', e => {
        if (e.key === 'Enter') doLogin();
      })
    );

    // ── Register ───────────────────────────────────────────────────────────────
    async function doRegister() {
      const name  = document.getElementById('reg-name').value.trim();
      const email = document.getElementById('reg-email').value.trim();
      const pw1   = document.getElementById('reg-pw').value;
      const pw2   = document.getElementById('reg-pw2').value;
      clearError('register-error');
      if (!email || !pw1)  { showError('register-error', 'Vul alle verplichte velden in.'); return; }
      if (pw1 !== pw2)     { showError('register-error', 'Wachtwoorden komen niet overeen.'); return; }
      if (pw1.length < 6)  { showError('register-error', 'Wachtwoord is te kort (minimaal 6 tekens).'); return; }
      setLoading('register-btn', 'reg-spinner', 'reg-label', true);
      try {
        await AuthService.register(email, pw1, name || undefined);
        window.location.replace('index.html');
      } catch (e) {
        showError('register-error', authErrorMessage(e.code));
        setLoading('register-btn', 'reg-spinner', 'reg-label', false);
      }
    }
    document.getElementById('register-btn').addEventListener('click', doRegister);
    ['reg-email', 'reg-pw', 'reg-pw2'].forEach(id =>
      document.getElementById(id).addEventListener('keydown', e => {
        if (e.key === 'Enter') doRegister();
      })
    );

    // ── Google Sign-in ─────────────────────────────────────────────────────────
    async function doGoogle() {
      try {
        await AuthService.loginWithGoogle();
        window.location.replace('index.html');
      } catch (e) {
        const msg = authErrorMessage(e.code);
        if (msg) {
          showError('login-error', msg);
          showError('register-error', msg);
        }
      }
    }
    document.getElementById('google-btn-login').addEventListener('click', doGoogle);
    document.getElementById('google-btn-reg').addEventListener('click', doGoogle);
  </script>
</body>
</html>
